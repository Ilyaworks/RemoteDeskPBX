appId: com.remotedeskpbx.client
productName: RemoteDeskPBX-Client
extraMetadata:
  main: dist/main/client.js
directories:
  output: release
  buildResources: resources
files:
  - dist/main/client.js
  - dist/main/preload.js
  - dist/client/**/*
  - resources/**/*
win:
  icon: resources/icon.ico
  target:
    - target: portable
      arch:
        - x64
portable:
  artifactName: "RemoteDeskPBX-Client-${version}.${ext}"