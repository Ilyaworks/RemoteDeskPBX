<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
  <title>Чат поддержки</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex; flex-direction: column;
      background: #f4f6fb; overflow: hidden;
      border: 1px solid #c9d3e6; border-radius: 10px;
    }
    .header {
      -webkit-app-region: drag;
      background: #1a73e8; color: #fff;
      padding: 10px 12px; display: flex; align-items: center; justify-content: space-between;
      font-size: 14px; font-weight: 600; user-select: none;
    }
    .header .close {
      -webkit-app-region: no-drag;
      cursor: pointer; font-size: 18px; line-height: 1; opacity: .85;
      background: rgba(255,255,255,.15); border: none; color: #fff;
      width: 24px; height: 24px; border-radius: 6px;
    }
    .header .close:hover { opacity: 1; }
    .messages {
      flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px;
    }
    .empty { color: #99a; text-align: center; font-size: 13px; margin-top: 20px; }
    .msg { max-width: 80%; padding: 8px 11px; border-radius: 12px; font-size: 13px; line-height: 1.35; word-wrap: break-word; }
    .msg.them { align-self: flex-start; background: #fff; color: #222; border: 1px solid #e2e8f4; border-bottom-left-radius: 4px; }
    .msg.me { align-self: flex-end; background: #1a73e8; color: #fff; border-bottom-right-radius: 4px; }
    .msg .who { display: block; font-size: 10px; opacity: .7; margin-bottom: 2px; }
    .input-row { display: flex; gap: 6px; padding: 10px; border-top: 1px solid #e2e8f4; background: #fff; }
    .input-row input { flex: 1; padding: 9px 10px; border: 1px solid #ccd; border-radius: 8px; font-size: 13px; outline: none; }
    .input-row input:focus { border-color: #1a73e8; }
    .input-row button { padding: 9px 14px; background: #1a73e8; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .input-row button:hover { background: #1666d0; }
  </style>
</head>
<body>
  <div class="header">
    <span>💬 Чат с поддержкой</span>
    <button class="close" id="close" title="Свернуть">×</button>
  </div>
  <div class="messages" id="messages">
    <div class="empty" id="empty">Здесь появятся сообщения от специалиста поддержки</div>
  </div>
  <div class="input-row">
    <input id="input" type="text" placeholder="Сообщение…" autocomplete="off">
    <button id="send">➤</button>
  </div>
  <script>
    var api = window.electronAPI || {};
    var messagesEl = document.getElementById('messages');
    var emptyEl = document.getElementById('empty');
    var inputEl = document.getElementById('input');

    function append(from, text) {
      if (emptyEl) { emptyEl.remove(); emptyEl = null; }
      var div = document.createElement('div');
      div.className = 'msg ' + (from === 'me' ? 'me' : 'them');
      var who = document.createElement('span');
      who.className = 'who';
      who.textContent = from === 'me' ? 'Вы' : '🛠️ Поддержка';
      var body = document.createElement('span');
      body.textContent = text;
      div.appendChild(who); div.appendChild(body);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function send() {
      var text = inputEl.value.trim();
      if (!text) return;
      append('me', text);
      if (api.chatSend) api.chatSend(text);
      inputEl.value = '';
      inputEl.focus();
    }

    document.getElementById('send').addEventListener('click', send);
    inputEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') send(); });
    document.getElementById('close').addEventListener('click', function () { if (api.hideChat) api.hideChat(); });

    if (api.onChatDisplay) api.onChatDisplay(function (msg) { if (msg && msg.text) append(msg.from === 'me' ? 'me' : 'them', msg.text); });
  </script>
</body>
</html>
