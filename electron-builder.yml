appId: com.remotedeskpbx.client
productName: RemoteDeskPBX
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - resources/**/*
asarUnpack:
  - "dist/main/remote-control.ps1"
win:
  target:
    - target: portable
      arch:
        - x64
portable:
  artifactName: "${productName}-v3.${ext}"
extraResources:
  - from: resources/
    to: resources/