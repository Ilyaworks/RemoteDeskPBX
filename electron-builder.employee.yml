appId: com.remotedeskpbx.employee
productName: RemoteDeskPBX-Employee
extraMetadata:
  main: dist/main/employee.js
directories:
  output: release
  buildResources: resources
files:
  - dist/main/employee.js
  - dist/main/preload.js
  - dist/employee/**/*
  - resources/**/*
win:
  icon: resources/icon.ico
  target:
    - target: portable
      arch:
        - x64
portable:
  artifactName: "RemoteDeskPBX-Employee-${version}.${ext}"